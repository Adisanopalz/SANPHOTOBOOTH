<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanPhotobooth</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.5); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(75, 85, 99, 0.8); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(107, 114, 128, 1); 
        }
        
        .hide { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-gray-950 text-white font-sans flex flex-col items-center py-6 px-4">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
        <i data-lucide="camera" class="w-8 h-8 text-pink-500"></i>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">
            SanPhotobooth
        </h1>
    </div>

    <div class="w-full max-w-4xl grid md:grid-cols-3 gap-6">
        <!-- Main Camera Area -->
        <div class="md:col-span-2 flex flex-col gap-4">
            <div class="relative bg-gray-900 rounded-2xl overflow-hidden shadow-2xl border border-gray-800 aspect-[4/3] flex items-center justify-center">
                
                <!-- Error Message -->
                <div id="error-container" class="text-red-400 p-6 text-center hide z-30 relative">
                    <i data-lucide="video" class="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                    <p id="error-text">Terjadi kesalahan.</p>
                </div>

                <!-- Video Element -->
                <video id="camera-video" autoplay playsinline muted class="w-full h-full object-cover hide"></video>
                
                <!-- Flash Effect -->
                <div id="flash-overlay" class="absolute inset-0 bg-white opacity-80 z-20 hide transition-opacity"></div>

                <!-- Countdown Overlay -->
                <div id="countdown-overlay" class="absolute inset-0 flex items-center justify-center bg-black/40 z-10 backdrop-blur-sm hide">
                    <span id="countdown-text" class="text-9xl font-bold text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.8)] animate-pulse">
                        3
                    </span>
                </div>
                
                <!-- Hidden Canvas -->
                <canvas id="capture-canvas" class="hidden"></canvas>
            </div>

            <!-- Controls -->
            <div class="flex items-center justify-between bg-gray-900 p-4 rounded-2xl border border-gray-800 shadow-lg">
                <div class="w-1/3 flex justify-start">
                    <button id="switch-btn" class="p-3 rounded-full bg-gray-800 hover:bg-gray-700 transition-colors hide" title="Ganti Kamera">
                        <i data-lucide="refresh-ccw" class="w-6 h-6 text-gray-300"></i>
                    </button>
                </div>

                <div class="w-1/3 flex justify-center">
                    <button id="capture-btn" class="relative w-20 h-20 rounded-full bg-white border-4 border-gray-300 flex items-center justify-center group hover:scale-105 active:scale-95 transition-transform disabled:opacity-50 disabled:cursor-not-allowed">
                        <div class="w-16 h-16 rounded-full bg-transparent border-2 border-gray-900 group-hover:bg-pink-500/10 transition-colors"></div>
                    </button>
                </div>

                <div class="w-1/3 flex justify-end">
                    <select id="device-select" class="bg-gray-800 text-sm text-gray-300 border border-gray-700 rounded-lg p-2 max-w-[120px] truncate focus:outline-none focus:border-pink-500">
                        <option value="">Memuat...</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Gallery / Strip Area -->
        <div class="md:col-span-1 bg-gray-900 border border-gray-800 rounded-2xl p-4 flex flex-col h-[500px] md:h-auto shadow-lg">
            <div class="flex items-center gap-2 mb-4 pb-4 border-b border-gray-800">
                <i data-lucide="image" class="w-5 h-5 text-gray-400"></i>
                <h2 class="font-semibold text-lg">Hasil Foto (<span id="gallery-count">0</span>)</h2>
            </div>
            
            <div id="gallery-container" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                <!-- Foto akan dirender di sini melalui JS -->
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- Konfigurasi IndexedDB ---
        const DB_NAME = 'SanPhotoboothDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'photos';

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (event) => resolve(event.target.result);
                request.onerror = (event) => reject(event.target.error);
            });
        };

        const savePhotoToDB = async (photo) => {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.add(photo).onsuccess = () => resolve(photo);
            });
        };

        const loadPhotosFromDB = async () => {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
            });
        };

        const deletePhotoFromDB = async (id) => {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.delete(id).onsuccess = () => resolve();
            });
        };

        // --- State dan Element DOM ---
        let currentStream = null;
        let devicesList = [];
        let photos = [];
        let isCountingDown = false;

        const videoEl = document.getElementById('camera-video');
        const canvasEl = document.getElementById('capture-canvas');
        const deviceSelect = document.getElementById('device-select');
        const switchBtn = document.getElementById('switch-btn');
        const captureBtn = document.getElementById('capture-btn');
        const errorContainer = document.getElementById('error-container');
        const errorText = document.getElementById('error-text');
        const flashOverlay = document.getElementById('flash-overlay');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownText = document.getElementById('countdown-text');
        const galleryContainer = document.getElementById('gallery-container');
        const galleryCount = document.getElementById('gallery-count');

        // --- Inisialisasi Ikon Lucide ---
        lucide.createIcons();

        // --- Fungsi UI ---
        const showError = (msg) => {
            errorText.textContent = msg;
            errorContainer.classList.remove('hide');
            videoEl.classList.add('hide');
            captureBtn.disabled = true;
        };

        const hideError = () => {
            errorContainer.classList.add('hide');
            videoEl.classList.remove('hide');
            captureBtn.disabled = false;
        };

        const renderGallery = () => {
            galleryCount.textContent = photos.length;
            
            if (photos.length === 0) {
                galleryContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-500 py-10">
                        <i data-lucide="image" class="w-12 h-12 mb-2 opacity-20"></i>
                        <p class="text-sm">Belum ada foto.</p>
                        <p class="text-xs">Mulai berpose!</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            galleryContainer.innerHTML = photos.map(photo => {
                const timeString = new Date(photo.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="group relative bg-gray-800 p-2 rounded-xl border border-gray-700 shadow-md">
                        <img src="${photo.dataUrl}" class="w-full h-auto rounded-lg object-cover bg-black" alt="Captured" />
                        <div class="absolute inset-0 bg-black/60 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
                            <button onclick="downloadPhoto('${photo.id}')" class="p-2 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition-transform hover:scale-110" title="Unduh">
                                <i data-lucide="download" class="w-5 h-5"></i>
                            </button>
                            <button onclick="deletePhoto('${photo.id}')" class="p-2 bg-red-500 text-white rounded-full hover:bg-red-600 transition-transform hover:scale-110" title="Hapus">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <div class="text-center mt-2 text-xs text-gray-400 font-mono">${timeString}</div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        };

        // --- Aksi Galeri ---
        window.downloadPhoto = (id) => {
            const photo = photos.find(p => p.id === id);
            if (!photo) return;
            const a = document.createElement('a');
            a.href = photo.dataUrl;
            a.download = `SanPhotobooth_${new Date(photo.timestamp).getTime()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.deletePhoto = async (id) => {
            try {
                await deletePhotoFromDB(id);
                photos = photos.filter(p => p.id !== id);
                renderGallery();
            } catch (err) {
                console.error("Gagal menghapus foto:", err);
            }
        };

        // --- Logika Kamera ---
        const stopStream = () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        };

        const startCamera = async (deviceId = null) => {
            try {
                // Hentikan stream lama
                stopStream();
                await new Promise(res => setTimeout(res, 200)); // Jeda mencegah NotReadableError

                const constraints = {
                    video: deviceId ? { deviceId: { ideal: deviceId } } : true
                };

                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoEl.srcObject = currentStream;
                hideError();

                // Deteksi jika kamera depan untuk mirror effect
                const currentTrack = currentStream.getVideoTracks()[0];
                const label = currentTrack.label.toLowerCase();
                if (label.includes('front') || label.includes('depan')) {
                    videoEl.classList.add('scale-x-[-1]');
                } else {
                    videoEl.classList.remove('scale-x-[-1]');
                }

                return currentTrack.getSettings().deviceId;

            } catch (err) {
                showError('Gagal menyalakan kamera. Pastikan izin diberikan dan tidak dipakai aplikasi lain.');
                console.error(err);
                return null;
            }
        };

        const initApp = async () => {
            // 1. Load Data
            try {
                const saved = await loadPhotosFromDB();
                photos = saved.sort((a, b) => b.timestamp - a.timestamp);
                renderGallery();
            } catch (err) { console.error("Gagal load DB:", err); }

            // 2. Init Camera & Devices
            try {
                // Panggil kamera pertama kali untuk dapat izin
                const activeDeviceId = await startCamera();
                
                // Ambil daftar perangkat
                const mediaDevices = await navigator.mediaDevices.enumerateDevices();
                devicesList = mediaDevices.filter(device => device.kind === 'videoinput');
                
                // Update dropdown UI
                deviceSelect.innerHTML = '';
                devicesList.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Kamera ${index + 1}`;
                    deviceSelect.appendChild(option);
                });

                if (activeDeviceId) {
                    deviceSelect.value = activeDeviceId;
                } else if (devicesList.length > 0) {
                    deviceSelect.value = devicesList[0].deviceId;
                }

                // Tampilkan tombol ganti kamera jika lebih dari 1
                if (devicesList.length > 1) {
                    switchBtn.classList.remove('hide');
                }

            } catch (err) {
                showError('Kamera tidak terdeteksi.');
            }
        };

        // --- Event Listeners Kamera ---
        deviceSelect.addEventListener('change', (e) => {
            if (e.target.value) {
                startCamera(e.target.value);
            }
        });

        switchBtn.addEventListener('click', () => {
            if (devicesList.length > 1) {
                const currentIndex = devicesList.findIndex(d => d.deviceId === deviceSelect.value);
                const nextIndex = (currentIndex + 1) % devicesList.length;
                deviceSelect.value = devicesList[nextIndex].deviceId;
                startCamera(deviceSelect.value);
            }
        });

        captureBtn.addEventListener('click', () => {
            if (isCountingDown) return;
            
            isCountingDown = true;
            captureBtn.disabled = true;
            captureBtn.classList.add('opacity-50');
            countdownOverlay.classList.remove('hide');
            
            let counter = 3;
            countdownText.textContent = counter;
            
            const timer = setInterval(() => {
                counter -= 1;
                
                if (counter === 0) {
                    clearInterval(timer);
                    captureImage();
                    setTimeout(() => {
                        countdownOverlay.classList.add('hide');
                        isCountingDown = false;
                        captureBtn.disabled = false;
                        captureBtn.classList.remove('opacity-50');
                    }, 500);
                } else {
                    countdownText.textContent = counter;
                }
            }, 1000);
        });

        const captureImage = async () => {
            // Flash Effect
            flashOverlay.classList.remove('hide');
            setTimeout(() => flashOverlay.classList.add('hide'), 150);

            // Draw to Canvas
            canvasEl.width = videoEl.videoWidth;
            canvasEl.height = videoEl.videoHeight;
            const ctx = canvasEl.getContext('2d');

            // Cek apakah video di-mirror (kamera depan)
            if (videoEl.classList.contains('scale-x-[-1]')) {
                ctx.translate(canvasEl.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
            
            const dataUrl = canvasEl.toDataURL('image/png');
            
            const newPhoto = {
                id: `photo_${Date.now()}`,
                dataUrl,
                timestamp: Date.now()
            };

            try {
                await savePhotoToDB(newPhoto);
                photos.unshift(newPhoto); // Tambah di awal array
                renderGallery();
            } catch (err) {
                console.error("Gagal simpan:", err);
            }
        };

        // Jalankan saat halaman siap
        window.addEventListener('DOMContentLoaded', initApp);

        // Cleanup saat tab ditutup
        window.addEventListener('beforeunload', stopStream);

    </script>
</body>
</html>
