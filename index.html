<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANPHOTOBOOTH</title>
    <style>
        /* CSS untuk Desain dan Responsivitas */
        :root {
            --primary-color: #ff4757;
            --bg-color: #f1f2f6;
            --text-color: #2f3542;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: var(--primary-color);
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
        }

        /* Membalikkan video seperti cermin agar natural */
        video {
            width: 100%;
            display: block;
            transform: scaleX(-1); 
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #snapBtn {
            background-color: var(--primary-color);
            color: white;
            flex-grow: 1;
        }

        #snapBtn:hover {
            background-color: #ff6b81;
        }

        #downloadBtn {
            background-color: #2ed573;
            color: white;
        }

        #downloadBtn:disabled {
            background-color: #a4b0be;
            cursor: not-allowed;
        }

        #downloadBtn:hover:not(:disabled) {
            background-color: #26de81;
        }

        /* Area hasil foto */
        .result-area {
            margin-top: 20px;
            display: none;
        }

        .result-area h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        #photo {
            width: 100%;
            border-radius: 10px;
            border: 3px solid var(--primary-color);
        }
    </style>
</head>
<body>

    <h1>SANPHOTOBOOTH 📸</h1>

    <div class="app-container">
        <div class="video-wrapper">
            <video id="video" autoplay playsinline></video>
        </div>
        
        <canvas id="canvas" style="display:none;"></canvas>

        <div class="controls">
            <button id="snapBtn">Ambil Foto!</button>
            <button id="downloadBtn" disabled>Unduh</button>
        </div>

        <div class="result-area" id="resultArea">
            <h3>Hasil Jepretan:</h3>
            <img id="photo" alt="Hasil Foto">
        </div>
    </div>

    <script>
        // JavaScript untuk Logika Kamera
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photo = document.getElementById('photo');
        const snapBtn = document.getElementById('snapBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultArea = document.getElementById('resultArea');
        const context = canvas.getContext('2d');

        // Meminta izin dan menyalakan kamera
        // 'facingMode: "user"' memprioritaskan kamera depan di HP
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(function(stream) {
                video.srcObject = stream;
            })
            .catch(function(err) {
                console.error("Terjadi kesalahan akses kamera: ", err);
                alert("Tidak dapat mengakses kamera. Pastikan Anda telah memberikan izin kamera pada browser.");
            });

        // Event saat tombol 'Ambil Foto' diklik
        snapBtn.addEventListener('click', function() {
            // Sesuaikan ukuran canvas dengan resolusi video asli
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Karena video kita di-mirror (dibalik), hasil canvas juga harus di-mirror
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            
            // Menggambar frame video ke dalam canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Mengubah canvas menjadi data gambar (URL)
            const dataURL = canvas.toDataURL('image/png');
            photo.src = dataURL;
            
            // Tampilkan area hasil dan aktifkan tombol unduh
            resultArea.style.display = 'block';
            downloadBtn.disabled = false;
        });

        // Event saat tombol 'Unduh' diklik
        downloadBtn.addEventListener('click', function() {
            const a = document.createElement('a');
            a.href = photo.src;
            // Penamaan file dinamis berdasarkan waktu
            a.download = 'SANPHOTOBOOTH_' + new Date().getTime() + '.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
