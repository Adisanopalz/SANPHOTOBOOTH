<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Realtime Camera Transform</title>
    <!-- Tailwind CSS untuk Styling UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google MediaPipe untuk AI Body Segmentation -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        canvas {
            transform: scaleX(-1); /* Efek Cermin (Mirror) */
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- Sidebar / Kontrol -->
    <aside class="glass-panel w-full md:w-80 h-auto md:h-screen p-6 flex flex-col shadow-2xl z-10 flex-shrink-0 overflow-y-auto">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 mb-2">
            AI VisionCam
        </h1>
        <p class="text-gray-400 text-sm mb-6">Transformasi kamera realtime dengan filter canvas & AI MediaPipe.</p>

        <!-- Status & Tombol Kamera -->
        <div class="mb-8">
            <button id="startBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                Mulai Kamera
            </button>
            <div id="status" class="mt-3 text-xs text-center text-yellow-400 hidden">Meminta akses kamera...</div>
        </div>

        <!-- Opsi Transformasi -->
        <div id="controls" class="opacity-50 pointer-events-none transition duration-300">
            <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3">Tahap 1: Dasar</h2>
            <div class="grid grid-cols-2 gap-2 mb-6">
                <button class="filter-btn active bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm transition" data-mode="normal">Normal</button>
            </div>

            <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3">Tahap 2: Filter Piksel</h2>
            <div class="grid grid-cols-2 gap-2 mb-6">
                <button class="filter-btn bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm transition" data-mode="grayscale">Grayscale</button>
                <button class="filter-btn bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm transition" data-mode="sepia">Sepia</button>
                <button class="filter-btn bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm transition" data-mode="invert">Invert</button>
                <button class="filter-btn bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm transition" data-mode="pixelate">Pixelate</button>
            </div>

            <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3">Tahap 3: Kekuatan AI <span class="text-xs text-purple-400">(Segmentasi)</span></h2>
            <div class="flex flex-col gap-2 mb-6">
                <button class="filter-btn bg-purple-900/50 hover:bg-purple-800 border border-purple-500/30 px-3 py-3 rounded text-sm transition text-left flex items-center justify-between" data-mode="ai_blur">
                    <span>AI Background Blur</span>
                    <span class="ai-status text-xs text-gray-400"></span>
                </button>
                <button class="filter-btn bg-green-900/50 hover:bg-green-800 border border-green-500/30 px-3 py-3 rounded text-sm transition text-left flex items-center justify-between" data-mode="ai_matrix">
                    <span>Matrix Background (AI)</span>
                    <span class="ai-status text-xs text-gray-400"></span>
                </button>
            </div>
        </div>
        
        <div class="mt-auto pt-6 text-xs text-gray-500 text-center">
            Semua pemrosesan AI dilakukan secara lokal di browser Anda.
        </div>
    </aside>

    <!-- Area Penampil Utama -->
    <main class="flex-1 relative flex items-center justify-center p-4 bg-black/90">
        <!-- Video element tersembunyi untuk menangkap stream -->
        <video id="input_video" class="hidden" autoplay playsinline></video>
        
        <!-- Canvas untuk menampilkan hasil akhir -->
        <div class="relative w-full max-w-4xl rounded-2xl overflow-hidden shadow-2xl border border-gray-700/50 aspect-video flex items-center justify-center bg-gray-900">
            <span id="placeholderText" class="text-gray-500 absolute z-0 flex flex-col items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="opacity-50"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
                Kamera Belum Aktif
            </span>
            <canvas id="output_canvas" class="w-full h-full object-contain relative z-10 hidden"></canvas>
        </div>
    </main>

    <!-- Canvas tersembunyi untuk animasi efek Matrix -->
    <canvas id="matrix_canvas" class="hidden"></canvas>

    <script>
        // DOM Elements
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const matrixCanvas = document.getElementById('matrix_canvas');
        const matrixCtx = matrixCanvas.getContext('2d');
        
        const startBtn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');
        const controlsEl = document.getElementById('controls');
        const placeholderText = document.getElementById('placeholderText');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // State Aplikasi
        let isCameraRunning = false;
        let currentMode = 'normal';
        let cameraUtils = null;
        let aiModel = null;
        let isAILoaded = false;

        // Inisialisasi Model AI (MediaPipe Selfie Segmentation)
        function initAIModel() {
            if (aiModel) return;
            
            document.querySelectorAll('.ai-status').forEach(el => el.textContent = "(Memuat...)");
            
            aiModel = new SelfieSegmentation({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
            }});

            aiModel.setOptions({
                modelSelection: 1, // 1 untuk landscape (lebih ringan & cepat)
            });

            aiModel.onResults(onAIResults);
            
            // Model diinisialisasi sepenuhnya saat pengiriman frame pertama berhasil,
            // tetapi kita tandai flag awal.
            isAILoaded = true; 
        }

        // Penanganan Tombol UI
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Hapus state aktif dari tombol lain
                filterBtns.forEach(b => {
                    b.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-600');
                    if(!b.classList.contains('bg-purple-900/50') && !b.classList.contains('bg-green-900/50')) {
                        b.classList.add('bg-gray-700');
                    }
                });
                
                // Set tombol aktif
                const target = e.currentTarget;
                if(!target.classList.contains('bg-purple-900/50') && !target.classList.contains('bg-green-900/50')) {
                     target.classList.remove('bg-gray-700');
                }
                target.classList.add('ring-2', 'ring-blue-500', 'bg-blue-600');

                currentMode = target.getAttribute('data-mode');

                // Jika memilih mode AI, pastikan model dimuat
                if (currentMode.startsWith('ai_') && !isAILoaded) {
                    initAIModel();
                }
            });
        });

        // Setup Animasi Matrix Hujan Kode
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%""\'#&_(),.;:?!\\|{}<>[]^~';
        let drops = [];
        const fontSize = 14;

        function initMatrix(width, height) {
            matrixCanvas.width = width;
            matrixCanvas.height = height;
            const columns = width / fontSize;
            drops = [];
            for(let x = 0; x < columns; x++) drops[x] = 1;
        }

        function drawMatrix() {
            // Efek jejak transparan
            matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            
            matrixCtx.fillStyle = '#0F0';
            matrixCtx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                matrixCtx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if(drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        // Loop Pemrosesan Frame
        async function processFrame() {
            if (!videoElement.videoWidth) return;

            // Sesuaikan ukuran kanvas dengan feed video
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                initMatrix(canvasElement.width, canvasElement.height);
            }

            // Jika mode AI (Tahap 3)
            if (currentMode.startsWith('ai_') && isAILoaded && aiModel) {
                // Kirim frame ke MediaPipe. Akan memanggil onAIResults secara asinkron.
                await aiModel.send({image: videoElement});
            } 
            // Jika mode Filter Biasa (Tahap 1 & 2)
            else {
                drawStandardFilters();
            }
        }

        // Menggambar filter konvensional (Tanpa AI)
        function drawStandardFilters() {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Set Filter CSS pada Canvas API
            if (currentMode === 'grayscale') canvasCtx.filter = 'grayscale(100%)';
            else if (currentMode === 'sepia') canvasCtx.filter = 'sepia(100%)';
            else if (currentMode === 'invert') canvasCtx.filter = 'invert(100%)';
            else canvasCtx.filter = 'none';

            // Efek Pikselisasi dikerjakan dengan mematikan smoothing
            if (currentMode === 'pixelate') {
                const pixelSize = 0.04; // 4% resolusi asli
                const w = canvasElement.width * pixelSize;
                const h = canvasElement.height * pixelSize;
                
                // Gambar kecil
                canvasCtx.drawImage(videoElement, 0, 0, w, h);
                
                // Matikan pelembutan (smoothing)
                canvasCtx.imageSmoothingEnabled = false;
                
                // Perbesar kembali dengan filter mati
                canvasCtx.drawImage(canvasElement, 0, 0, w, h, 0, 0, canvasElement.width, canvasElement.height);
            } else {
                // Gambar normal dengan / tanpa filter
                canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            }
            canvasCtx.restore();
        }

        // Callback ketika Model AI selesai memproses satu frame
        function onAIResults(results) {
            // Hapus status "Memuat..." pada UI jika ini adalah frame pertama
            document.querySelectorAll('.ai-status').forEach(el => el.textContent = "");

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 1. Gambar mask (siluet tubuh) yang dikembalikan oleh AI
            canvasCtx.drawImage(results.segmentationMask, 0, 0, canvasElement.width, canvasElement.height);

            // 2. TIMPA area DALAM mask dengan gambar video asli (Ini menampilkan tubuh Anda)
            canvasCtx.globalCompositeOperation = 'source-in';
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 3. TIMPA area LUAR mask (Background) dengan efek pilihan Anda
            canvasCtx.globalCompositeOperation = 'destination-atop';

            if (currentMode === 'ai_blur') {
                // Efek Blur (Gunakan CSS filter pada canvas lalu gambar video asli)
                canvasCtx.filter = 'blur(15px)';
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            } 
            else if (currentMode === 'ai_matrix') {
                // Efek Hacker Matrix
                drawMatrix(); // Update posisi hujan kode
                canvasCtx.drawImage(matrixCanvas, 0, 0, canvasElement.width, canvasElement.height);
            }

            canvasCtx.restore();
        }

        // Memulai Kamera
        startBtn.addEventListener('click', async () => {
            if (isCameraRunning) return;
            
            try {
                statusEl.classList.remove('hidden');
                statusEl.textContent = "Meminta akses kamera...";
                statusEl.className = "mt-3 text-xs text-center text-yellow-400";
                
                // Kita gunakan CameraUtils dari MediaPipe yang otomatis menangani loop frame yang optimal
                cameraUtils = new Camera(videoElement, {
                    onFrame: async () => {
                        await processFrame();
                    },
                    width: 640,
                    height: 480
                });

                await cameraUtils.start();
                
                isCameraRunning = true;
                
                // Update UI
                statusEl.textContent = "Kamera Aktif";
                statusEl.className = "mt-3 text-xs text-center text-green-400";
                startBtn.classList.replace('bg-blue-600', 'bg-green-600');
                startBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
                startBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Berjalan`;
                
                controlsEl.classList.remove('opacity-50', 'pointer-events-none');
                placeholderText.classList.add('hidden');
                canvasElement.classList.remove('hidden');
                
                // Pra-muat AI di background untuk kenyamanan transisi
                initAIModel();

            } catch (err) {
                console.error(err);
                statusEl.textContent = "Gagal mengakses kamera. Pastikan izin diberikan.";
                statusEl.className = "mt-3 text-xs text-center text-red-500";
            }
        });
    </script>
</body>
</html>
