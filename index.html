<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANPHOTOBOOTH PRO</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome untuk Icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #312e81, #4c1d95);
            background-attachment: fixed;
        }

        .mirrored {
            transform: scaleX(-1);
        }

        .flash-active {
            animation: flashAnim 0.5s ease-out forwards;
        }

        @keyframes flashAnim {
            0% { background-color: rgba(255, 255, 255, 1); opacity: 1; }
            100% { background-color: rgba(255, 255, 255, 0); opacity: 0; display: none; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        .countdown-text {
            animation: pop 1s ease-in-out;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center p-4 sm:p-8">

    <!-- Header -->
    <header class="text-center mb-6">
        <h1 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 tracking-wider">
            SANPHOTOBOOTH <i class="fa-solid fa-camera-retro text-pink-400"></i>
        </h1>
        <p class="text-gray-300 mt-2 text-sm sm:text-base">Tangkap momen dengan AI Hand Tracking ✌️</p>
    </header>

    <!-- Main App Container -->
    <div class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Kolom Kiri: Kamera & Kontrol Utama -->
        <div class="lg:col-span-2 flex flex-col gap-4">
            
            <!-- Video Container -->
            <div class="relative w-full aspect-[4/3] bg-black rounded-2xl overflow-hidden shadow-2xl border-4 border-white/10 group">
                <!-- Indikator Hand Tracking Aktif -->
                <div id="handIndicator" class="absolute top-4 left-4 bg-black/50 backdrop-blur px-3 py-1.5 rounded-full border border-white/20 z-20 hidden items-center gap-2">
                    <i class="fa-solid fa-hand-sparkles text-pink-400 animate-pulse"></i>
                    <span class="text-xs font-semibold text-white">Sensor Tangan: Aktif</span>
                    <span class="text-[10px] text-gray-300 ml-1">(Pose ✌️ atau ✋)</span>
                </div>

                <!-- Indikator Loading AI -->
                <div id="aiLoadingIndicator" class="absolute top-4 right-4 bg-black/50 backdrop-blur px-3 py-1.5 rounded-full border border-white/20 z-20 flex items-center gap-2">
                    <i class="fa-solid fa-circle-notch fa-spin text-indigo-400"></i>
                    <span class="text-xs font-semibold text-white">Memuat AI...</span>
                </div>

                <!-- Video Stream -->
                <video id="video" class="w-full h-full object-cover mirrored" autoplay playsinline></video>
                
                <!-- Overlay Flash -->
                <div id="flashOverlay" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-20"></div>
                
                <!-- Overlay Hitung Mundur -->
                <div id="countdownOverlay" class="absolute inset-0 flex items-center justify-center z-10 hidden">
                    <span id="countdownText" class="text-8xl font-bold text-white drop-shadow-[0_0_15px_rgba(0,0,0,0.8)]">3</span>
                </div>

                <!-- Error Message Box -->
                <div id="errorBox" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-30 hidden p-6 text-center">
                    <i class="fa-solid fa-video-slash text-4xl text-red-500 mb-3"></i>
                    <h3 class="font-bold text-xl mb-2">Akses Kamera Ditolak</h3>
                    <p class="text-sm text-gray-400">Harap izinkan akses kamera di browser Anda untuk menggunakan photobooth ini.</p>
                    <button id="retryBtn" class="mt-4 px-4 py-2 bg-indigo-500 hover:bg-indigo-600 rounded-lg font-semibold transition">Coba Lagi</button>
                </div>
            </div>

            <!-- Kontrol Utama -->
            <div class="glass-panel rounded-2xl p-4 flex justify-center items-center shadow-lg gap-3 sm:gap-6 flex-wrap relative">
                <button id="switchCamBtn" class="p-3 bg-white/10 hover:bg-white/20 rounded-full transition absolute left-4" title="Ganti Kamera">
                    <i class="fa-solid fa-rotate text-xl"></i>
                </button>
                
                <!-- Tombol Hand Tracking -->
                <button id="handTrackingBtn" class="p-3 bg-white/10 hover:bg-white/20 rounded-full transition flex items-center gap-2 opacity-50 cursor-not-allowed" title="Auto Jepret via Gestur Jari" disabled>
                    <i class="fa-solid fa-hand-sparkles text-xl"></i>
                    <span id="handStatus" class="font-bold text-sm hidden sm:inline">AI Off</span>
                </button>

                <!-- Tombol Capture -->
                <button id="captureBtn" class="group relative w-16 h-16 sm:w-20 sm:h-20 bg-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.4)] hover:scale-105 transition transform z-10">
                    <div class="w-12 h-12 sm:w-16 sm:h-16 bg-gradient-to-tr from-pink-500 to-indigo-500 rounded-full border-2 border-white group-active:scale-95 transition"></div>
                </button>

                <!-- Timer Toggle -->
                <button id="timerBtn" class="p-3 bg-indigo-500/80 hover:bg-indigo-500 rounded-full transition flex items-center gap-2" title="Gunakan Timer 3 Detik">
                    <i class="fa-solid fa-stopwatch text-xl"></i>
                    <span id="timerStatus" class="font-bold text-sm hidden sm:inline">On</span>
                </button>
            </div>
        </div>

        <!-- Kolom Kanan: Pengaturan Filter & Frame -->
        <div class="glass-panel rounded-2xl p-6 flex flex-col gap-6 shadow-lg h-fit">
            
            <!-- Filters -->
            <div>
                <h3 class="font-bold text-lg mb-3 flex items-center gap-2"><i class="fa-solid fa-wand-magic-sparkles text-pink-400"></i> Filter Warna</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button class="filter-btn active bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg text-sm font-medium transition border-2 border-transparent" data-filter="none">Normal</button>
                    <button class="filter-btn bg-white/10 hover:bg-white/20 py-2 rounded-lg text-sm font-medium transition border-2 border-transparent" data-filter="grayscale(100%)">B/W</button>
                    <button class="filter-btn bg-white/10 hover:bg-white/20 py-2 rounded-lg text-sm font-medium transition border-2 border-transparent" data-filter="sepia(100%)">Sepia</button>
                    <button class="filter-btn bg-white/10 hover:bg-white/20 py-2 rounded-lg text-sm font-medium transition border-2 border-transparent" data-filter="invert(100%)">Invert</button>
                </div>
            </div>

            <hr class="border-white/10">

            <!-- Frames -->
            <div>
                <h3 class="font-bold text-lg mb-3 flex items-center gap-2"><i class="fa-solid fa-border-all text-indigo-400"></i> Bingkai (Frame)</h3>
                <div class="flex flex-col gap-2">
                    <button class="frame-btn active bg-indigo-600 hover:bg-indigo-500 py-2 px-4 rounded-lg text-sm font-medium transition text-left" data-frame="none">Tanpa Bingkai</button>
                    <button class="frame-btn bg-white/10 hover:bg-white/20 py-2 px-4 rounded-lg text-sm font-medium transition text-left flex justify-between" data-frame="polaroid">Polaroid <i class="fa-solid fa-image"></i></button>
                    <button class="frame-btn bg-white/10 hover:bg-white/20 py-2 px-4 rounded-lg text-sm font-medium transition text-left flex justify-between" data-frame="cinematic">Sinematik <i class="fa-solid fa-film"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Galeri Hasil Jepretan -->
    <div class="w-full max-w-4xl mt-8">
        <h3 class="font-bold text-xl mb-4 flex items-center gap-2"><i class="fa-solid fa-images"></i> Galeri Photobooth</h3>
        <div id="gallery" class="flex gap-4 overflow-x-auto custom-scrollbar pb-4 min-h-[150px] items-center">
            <p id="emptyGalleryMsg" class="text-gray-400 text-sm italic w-full text-center">Belum ada foto. Ayo mulai memotret!</p>
            <!-- Foto akan muncul di sini -->
        </div>
    </div>

    <!-- Canvas Tersembunyi untuk Pemrosesan -->
    <canvas id="canvas" class="hidden"></canvas>

    <!-- Script Utama (Bertipe Module agar bisa import MediaPipe) -->
    <script type="module">
        import {
            GestureRecognizer,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // DOM Elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('captureBtn');
        const switchCamBtn = document.getElementById('switchCamBtn');
        const timerBtn = document.getElementById('timerBtn');
        const timerStatus = document.getElementById('timerStatus');
        const handTrackingBtn = document.getElementById('handTrackingBtn');
        const handStatus = document.getElementById('handStatus');
        const handIndicator = document.getElementById('handIndicator');
        const aiLoadingIndicator = document.getElementById('aiLoadingIndicator');
        
        const flashOverlay = document.getElementById('flashOverlay');
        const countdownOverlay = document.getElementById('countdownOverlay');
        const countdownText = document.getElementById('countdownText');
        const errorBox = document.getElementById('errorBox');
        const retryBtn = document.getElementById('retryBtn');
        const gallery = document.getElementById('gallery');
        const emptyGalleryMsg = document.getElementById('emptyGalleryMsg');
        
        const filterBtns = document.querySelectorAll('.filter-btn');
        const frameBtns = document.querySelectorAll('.frame-btn');

        // State variables
        let currentStream = null;
        let facingMode = 'user';
        let useTimer = true;
        let activeFilter = 'none';
        let activeFrame = 'none';
        let isCapturing = false;
        let captureCooldown = false; // Mencegah spam foto beruntun dari AI

        // AI Hand Tracking Variables
        let gestureRecognizer = null;
        let handDetectionEnabled = false;
        let lastVideoTime = -1;

        // Inisialisasi Model AI MediaPipe
        async function loadAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                
                // Aktifkan tombol saat model siap
                aiLoadingIndicator.classList.add('hidden');
                handTrackingBtn.disabled = false;
                handTrackingBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                console.log("Model AI siap!");
            } catch (err) {
                console.error("Gagal memuat model AI:", err);
                aiLoadingIndicator.innerHTML = `<span class="text-xs font-semibold text-red-400">Gagal memuat AI</span>`;
            }
        }
        loadAI();

        // Inisialisasi Kamera
        async function initCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            try {
                const constraints = {
                    video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                
                if (facingMode === 'user') {
                    video.classList.add('mirrored');
                } else {
                    video.classList.remove('mirrored');
                }
                
                errorBox.classList.add('hidden');
            } catch (err) {
                console.error("Akses kamera gagal:", err);
                errorBox.classList.remove('hidden');
            }
        }

        // Loop Prediksi AI pada Kamera
        function predictWebcam() {
            // Berhenti jika fitur mati, AI belum siap, sedang memotret, atau sedang cooldown
            if (!handDetectionEnabled || !gestureRecognizer) return;

            if (!isCapturing && !captureCooldown && video.readyState >= 2) {
                let nowInMs = Date.now();
                if (video.currentTime !== lastVideoTime) {
                    lastVideoTime = video.currentTime;
                    const results = gestureRecognizer.recognizeForVideo(video, nowInMs);
                    
                    if (results.gestures.length > 0) {
                        const gestureName = results.gestures[0][0].categoryName;
                        const score = results.gestures[0][0].score;
                        
                        // Jika pose jari V (Peace) atau Telapak Terbuka, dan akurasi tinggi
                        if ((gestureName === 'Victory' || gestureName === 'Open_Palm') && score > 0.60) {
                            console.log("Gestur terdeteksi!", gestureName, score);
                            takePhoto(); // Memicu jepretan otomatis
                        }
                    }
                }
            }
            
            // Lanjutkan looping jika fitur masih nyala
            if (handDetectionEnabled) {
                window.requestAnimationFrame(predictWebcam);
            }
        }

        // Event: Ganti Kamera
        switchCamBtn.addEventListener('click', () => {
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            initCamera();
        });
        retryBtn.addEventListener('click', initCamera);

        // Event: Toggle Hand Tracking
        handTrackingBtn.addEventListener('click', () => {
            if (!gestureRecognizer) return;

            handDetectionEnabled = !handDetectionEnabled;
            if (handDetectionEnabled) {
                handTrackingBtn.classList.replace('bg-white/10', 'bg-pink-500/80');
                handTrackingBtn.classList.replace('hover:bg-white/20', 'hover:bg-pink-500');
                handStatus.textContent = 'AI On';
                handIndicator.classList.remove('hidden');
                handIndicator.classList.add('flex');
                
                // Pastikan untuk selalu paksa Timer nyala (wajib untuk hand gesture)
                if (!useTimer) timerBtn.click();
                
                predictWebcam(); // Mulai deteksi
            } else {
                handTrackingBtn.classList.replace('bg-pink-500/80', 'bg-white/10');
                handTrackingBtn.classList.replace('hover:bg-pink-500', 'hover:bg-white/20');
                handStatus.textContent = 'AI Off';
                handIndicator.classList.remove('flex');
                handIndicator.classList.add('hidden');
            }
        });

        // Event: Toggle Timer
        timerBtn.addEventListener('click', () => {
            useTimer = !useTimer;
            if (useTimer) {
                timerBtn.classList.replace('bg-white/10', 'bg-indigo-500/80');
                timerStatus.textContent = 'On';
            } else {
                timerBtn.classList.replace('bg-indigo-500/80', 'bg-white/10');
                timerStatus.textContent = 'Off';
                // Jika timer dimatikan, matikan juga Hand Tracking untuk mencegah spam
                if(handDetectionEnabled) handTrackingBtn.click();
            }
        });

        // Event: Pilih Filter
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => {
                    b.classList.remove('bg-indigo-600', 'active');
                    b.classList.add('bg-white/10');
                });
                e.target.classList.remove('bg-white/10');
                e.target.classList.add('bg-indigo-600', 'active');
                activeFilter = e.target.getAttribute('data-filter');
                video.style.filter = activeFilter !== 'none' ? activeFilter : '';
            });
        });

        // Event: Pilih Bingkai
        frameBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                frameBtns.forEach(b => {
                    b.classList.remove('bg-indigo-600', 'active');
                    b.classList.add('bg-white/10');
                });
                e.target.classList.remove('bg-white/10');
                e.target.classList.add('bg-indigo-600', 'active');
                activeFrame = e.target.getAttribute('data-frame');
            });
        });

        // Fungsi Ambil Foto Utama
        async function takePhoto() {
            if (isCapturing) return;
            isCapturing = true; // Kunci status memotret agar AI / klik ganda tidak bertabrakan

            if (useTimer) {
                countdownOverlay.classList.remove('hidden');
                for (let i = 3; i > 0; i--) {
                    countdownText.textContent = i;
                    countdownText.style.animation = 'none';
                    countdownText.offsetHeight; /* trigger reflow */
                    countdownText.style.animation = null; 
                    countdownText.classList.add('countdown-text');
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                countdownOverlay.classList.add('hidden');
            }

            flashOverlay.classList.remove('hidden');
            flashOverlay.classList.add('flash-active');
            
            setTimeout(() => {
                flashOverlay.classList.remove('flash-active');
                flashOverlay.classList.add('hidden');
                processImage();
                
                // Jeda cooldown (2 detik) sebelum AI bisa membaca gestur lagi
                isCapturing = false;
                captureCooldown = true;
                setTimeout(() => { captureCooldown = false; }, 2000); 
            }, 100);
        }

        // Fungsi Memproses Canvas (Filter + Bingkai)
        function processImage() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.save();
            if (facingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }

            ctx.filter = activeFilter !== 'none' ? activeFilter : 'none';
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            if (activeFrame === 'polaroid') {
                drawPolaroidFrame(canvas.width, canvas.height);
            } else if (activeFrame === 'cinematic') {
                drawCinematicFrame(canvas.width, canvas.height);
            }

            const photoUrl = canvas.toDataURL('image/jpeg', 0.9);
            addToGallery(photoUrl);
        }

        // Fungsi Frame Polaroid
        function drawPolaroidFrame(w, h) {
            const thickBottom = h * 0.20;
            const borderSize = w * 0.05;
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, borderSize);
            ctx.fillRect(0, 0, borderSize, h);
            ctx.fillRect(w - borderSize, 0, borderSize, h);
            ctx.fillRect(0, h - thickBottom, w, thickBottom);
            
            ctx.fillStyle = '#2f3542';
            const fontSize = Math.floor(h * 0.06);
            ctx.font = `bold ${fontSize}px 'Poppins', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SANPHOTOBOOTH', w / 2, h - (thickBottom / 2));
        }

        // Fungsi Frame Sinematik
        function drawCinematicFrame(w, h) {
            const barHeight = h * 0.12;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, barHeight);
            ctx.fillRect(0, h - barHeight, w, barHeight);
        }

        // Tambahkan foto ke UI Galeri
        function addToGallery(dataUrl) {
            emptyGalleryMsg.style.display = 'none';

            const item = document.createElement('div');
            item.className = 'relative flex-shrink-0 group w-32 h-32 sm:w-40 sm:h-40 rounded-xl overflow-hidden border-2 border-white/20 shadow-lg';
            
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'w-full h-full object-cover';
            
            const dlOverlay = document.createElement('div');
            dlOverlay.className = 'absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300';
            
            const dlBtn = document.createElement('a');
            dlBtn.href = dataUrl;
            dlBtn.download = `SANPHOTOBOOTH_${new Date().getTime()}.jpg`;
            dlBtn.className = 'bg-pink-500 hover:bg-pink-600 text-white p-2 rounded-full transform hover:scale-110 transition';
            dlBtn.innerHTML = '<i class="fa-solid fa-download"></i> Unduh';
            
            dlOverlay.appendChild(dlBtn);
            item.appendChild(img);
            item.appendChild(dlOverlay);
            
            gallery.insertBefore(item, gallery.firstChild);
        }

        // Event Listeners Utama
        captureBtn.addEventListener('click', takePhoto);
        window.addEventListener('load', initCamera);

    </script>
</body>
</html>
